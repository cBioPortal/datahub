name: Verify S3 Study Tarballs for LFS Pointers

on:
  workflow_dispatch:

jobs:
  verify_s3_studies:
    if: github.repository == 'cbioportal/datahub'
    runs-on: ubuntu-latest
    env:
      SAML2AWS_VER: '2.36.18'
      AWS_PROFILE: 'default'
      AWS_REGION: 'us-east-1'

    steps:
      - name: Install saml2aws
        run: |
          wget -O saml2aws.tar.gz https://github.com/Versent/saml2aws/releases/download/v${SAML2AWS_VER}/saml2aws_${SAML2AWS_VER}_linux_amd64.tar.gz
          tar -xzvf saml2aws.tar.gz
          sudo mv saml2aws /usr/local/bin/
          chmod +x /usr/local/bin/saml2aws
          saml2aws --version

      - name: Configure saml2aws
        run: |
          saml2aws configure \
            --idp-provider="${{ secrets.SAML_IDP_PROVIDER }}" \
            --mfa="${{ secrets.SAML_MFA }}" \
            --url="${{ secrets.SAML_URL }}" \
            --username="${{ secrets.SAML_USERNAME }}" \
            --aws-urn="${{ secrets.SAML_AWS_URN }}" \
            --session-duration="${{ secrets.SAML_SESSION_DURATION }}" \
            --skip-prompt \
            --profile="${{ env.AWS_PROFILE }}"

      - name: Login to AWS via saml2aws
        env:
          SAML2AWS_USERNAME: ${{ secrets.SAML_USERNAME }}
          SAML2AWS_PASSWORD: ${{ secrets.SAML_PASSWORD }}
          SAML2AWS_ROLE: ${{ secrets.SAML_ROLE }}
          AWS_EC2_METADATA_DISABLED: "true"
        run: |
          saml2aws login \
            --force \
            --skip-prompt

      - name: Verify S3 study tarballs are not LFS pointers
        env:
          AWS_EC2_METADATA_DISABLED: "true"
        run: |
          LFS_HEADER="version https://git-lfs.github.com/spec/v1"

          # Check a file from a tarball stream for LFS pointer signature
          # Usage: is_lfs_pointer <bucket> <study_key> <file_pattern>
          is_lfs_pointer() {
            local bucket=$1
            local study_key=$2
            local pattern=$3
            local first_line
            first_line=$(aws s3 cp "s3://${bucket}/${study_key}" - \
              | tar -xzO --wildcards "$pattern" 2>/dev/null \
              | head -1)
            if [[ "$first_line" == *"$LFS_HEADER"* ]]; then
              return 0  # is an LFS pointer
            fi
            return 1    # is real data
          }

          echo "Fetching list of study tarballs from S3..."
          studies=$(aws s3 ls "s3://${{ secrets.S3_BUCKET }}/" \
            | awk '{print $4}' \
            | grep '\.tar\.gz$')

          if [[ -z "$studies" ]]; then
            echo "ERROR: No .tar.gz files found in S3 bucket"
            exit 1
          fi

          total=0
          failed=0
          skipped=0
          failed_studies=""

          for study_key in $studies; do
            total=$((total + 1))
            study_name="${study_key%.tar.gz}"
            check_file=""
            check_pattern=""

            # Check if data_mutations.txt exists in the tarball
            if aws s3 cp "s3://${{ secrets.S3_BUCKET }}/${study_key}" - \
                | tar -tzO 2>/dev/null | grep -q "data_mutations.txt"; then
              check_pattern="*/data_mutations.txt"
              check_file="data_mutations.txt"
            else
              # Fall back to first rna/mrna file found in the tarball
              rna_file=$(aws s3 cp "s3://${{ secrets.S3_BUCKET }}/${study_key}" - \
                | tar -tzO 2>/dev/null \
                | grep -iE "(rna|mrna)" \
                | head -1)
              if [[ -n "$rna_file" ]]; then
                check_pattern="$rna_file"
                check_file=$(basename "$rna_file")
              fi
            fi

            if [[ -z "$check_pattern" ]]; then
              echo "SKIP: $study_name — no data_mutations.txt or rna/mrna file found"
              skipped=$((skipped + 1))
              continue
            fi

            if is_lfs_pointer "${{ secrets.S3_BUCKET }}" "$study_key" "$check_pattern"; then
              echo "FAIL: $study_name — $check_file is an LFS pointer"
              failed=$((failed + 1))
              failed_studies="$failed_studies\n  - $study_name (checked: $check_file)"
            else
              echo "OK:   $study_name — $check_file contains real data"
            fi
          done

          echo ""
          echo "============================================================"
          echo " Verification Summary"
          echo "============================================================"
          echo " Total studies checked : $total"
          echo " Passed                : $((total - failed - skipped))"
          echo " Skipped (no data file): $skipped"
          echo " Failed (LFS pointers) : $failed"

          if [[ $failed -gt 0 ]]; then
            echo ""
            echo " Studies with LFS pointers:"
            echo -e "$failed_studies"
            echo "============================================================"
            exit 1
          else
            echo " All studies passed — no LFS pointers detected."
            echo "============================================================"
          fi

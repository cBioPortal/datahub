name: Verify S3 Study Tarballs for LFS Pointers

on:
  workflow_dispatch:

jobs:
  verify_s3_studies:
    if: github.repository == 'cbioportal/datahub'
    runs-on: ubuntu-latest
    env:
      SAML2AWS_VER: '2.36.18'
      AWS_PROFILE: 'default'
      AWS_REGION: 'us-east-1'
      MIN_STUDY_SIZE_BYTES: 1048576  # 1MB minimum - LFS pointer tarballs will be tiny (< 10KB)
    steps:
      - name: Install saml2aws
        run: |
          wget -O saml2aws.tar.gz https://github.com/Versent/saml2aws/releases/download/v${SAML2AWS_VER}/saml2aws_${SAML2AWS_VER}_linux_amd64.tar.gz
          tar -xzvf saml2aws.tar.gz
          sudo mv saml2aws /usr/local/bin/
          chmod +x /usr/local/bin/saml2aws
          saml2aws --version
      - name: Configure saml2aws
        run: |
          saml2aws configure \
            --idp-provider="${{ secrets.SAML_IDP_PROVIDER }}" \
            --mfa="${{ secrets.SAML_MFA }}" \
            --url="${{ secrets.SAML_URL }}" \
            --username="${{ secrets.SAML_USERNAME }}" \
            --aws-urn="${{ secrets.SAML_AWS_URN }}" \
            --session-duration="${{ secrets.SAML_SESSION_DURATION }}" \
            --skip-prompt \
            --profile="${{ env.AWS_PROFILE }}"
      - name: Login to AWS via saml2aws
        env:
          SAML2AWS_USERNAME: ${{ secrets.SAML_USERNAME }}
          SAML2AWS_PASSWORD: ${{ secrets.SAML_PASSWORD }}
          SAML2AWS_ROLE: ${{ secrets.SAML_ROLE }}
          AWS_EC2_METADATA_DISABLED: "true"
        run: |
          saml2aws login \
            --force \
            --skip-prompt

      - name: Verify S3 study tarballs are not LFS pointers
        env:
          AWS_EC2_METADATA_DISABLED: "true"
        run: |
          echo "Fetching list of study tarballs from S3..."
          studies=$(aws s3 ls "s3://${{ secrets.S3_BUCKET }}/" | awk '{print $4}' | grep '\.tar\.gz$')

          if [[ -z "$studies" ]]; then
            echo "ERROR: No .tar.gz files found in S3 bucket"
            exit 1
          fi

          total=0
          failed=0
          failed_studies=""

          for study in $studies; do
            size=$(aws s3api head-object \
              --bucket "${{ secrets.S3_BUCKET }}" \
              --key "$study" \
              --query ContentLength \
              --output text)

            total=$((total + 1))

            if [[ "$size" -lt "${{ env.MIN_STUDY_SIZE_BYTES }}" ]]; then
              echo "FAIL: $study is ${size} bytes — likely contains LFS pointers"
              failed=$((failed + 1))
              failed_studies="$failed_studies\n  - $study (${size} bytes)"
            else
              echo "OK:   $study is ${size} bytes"
            fi
          done

          echo ""
          echo "============================================================"
          echo " Verification Summary"
          echo "============================================================"
          echo " Total studies checked : $total"
          echo " Passed                : $((total - failed))"
          echo " Failed                : $failed"

          if [[ $failed -gt 0 ]]; then
            echo ""
            echo "Studies that appear to contain LFS pointers:"
            echo -e "$failed_studies"
            echo "============================================================"
            exit 1
          else
            echo " All studies passed the size check."
            echo "============================================================"
          fi
